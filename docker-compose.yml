services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civilpdf
      POSTGRES_USER: civilpdf
      POSTGRES_PASSWORD: civilpdf_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civilpdf -d civilpdf"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: src/console/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://civilpdf:civilpdf_dev@db:5432/civilpdf
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:3000
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/console/backend:/app
      - uploaded_files:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: src/console/frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./src/console/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  uploaded_files:
