name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/console/backend/requirements-dev.txt
      - run: pip install ruff==0.8.6
      - run: ruff check src/console/backend/
      - run: ruff format --check src/console/backend/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/console/backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r src/console/backend/requirements.txt
          pip install -r src/console/backend/requirements-dev.txt
      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          PYTHONPATH: src/console/backend
        run: python -m pytest tests/console/ -v --tb=short --cov=src/console/backend --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: backend

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r src/console/backend/requirements.txt

  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/console/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/console/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
